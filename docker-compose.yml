version: '3.9'

services:
  hello-service:
    build:
      context: ./backend/helloService
      dockerfile: Dockerfile
    container_name: hello-service
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
    networks:
      - app-network
    restart: unless-stopped

  profile-service:
    build:
      context: ./backend/profileService
      dockerfile: Dockerfile
    container_name: profile-service
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      MONGO_URL: mongodb://mongo:27017/profile-db
    depends_on:
      - mongo
    networks:
      - app-network
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: mongo-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - hello-service
      - profile-service
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
