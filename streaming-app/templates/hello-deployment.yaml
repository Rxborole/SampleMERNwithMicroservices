apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-service
spec:
  replicas: {{ .Values.hello.replicaCount }}
  selector:
    matchLabels:
      app: hello-service
  template:
    metadata:
      labels:
        app: hello-service
    spec:
      containers:
      - name: hello-service
        image: "{{ .Values.hello.image.repository }}:{{ .Values.hello.image.tag }}"
        imagePullPolicy: {{ .Values.hello.image.pullPolicy }}
        ports:
        - containerPort: 5001
